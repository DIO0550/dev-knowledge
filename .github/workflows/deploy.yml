# .github/workflows/deploy.yml
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_run:
    workflows: ["Setup from template"]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    # テンプレートリポジトリ自体はスキップ、setup完了後 or my-siteがリネーム済みの場合のみ実行
    if: |
      github.event.repository.is_template == false &&
      (github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Detect site directory
        id: detect
        run: |
          if [ -d "${{ github.event.repository.name }}" ]; then
            echo "dir=${{ github.event.repository.name }}" >> "$GITHUB_OUTPUT"
          else
            echo "dir=my-site" >> "$GITHUB_OUTPUT"
          fi

      - uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v4.1.0
        with:
          version: 10

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: ${{ steps.detect.outputs.dir }}/pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile
        working-directory: ${{ steps.detect.outputs.dir }}
      - run: pnpm build
        working-directory: ${{ steps.detect.outputs.dir }}

      - name: Setup Pages
        uses: actions/configure-pages@1f0c5cde4bc74cd7e1254d0cb4de8d49e9068c7d # v4.0.0
        with:
          enablement: true

      - uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3.0.1
        with:
          path: ${{ steps.detect.outputs.dir }}/build

  deploy:
    needs: build
    if: github.event.repository.is_template == false
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4.0.5
        id: deployment
